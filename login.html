<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 / 註冊 - 示範包租代管</title>
  <link rel="stylesheet" href="/src/css/style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0F766E 0%, #14B8A6 50%, #0369A1 100%);
      padding: var(--space-md);
    }
    .auth-card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: var(--space-2xl);
      width: 100%;
      max-width: 440px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .auth-header {
      text-align: center;
      margin-bottom: var(--space-xl);
    }
    .auth-header h1 {
      font-size: 1.8rem;
      color: var(--color-primary);
      margin-bottom: var(--space-xs);
    }
    .auth-header p {
      color: var(--color-text-muted);
      font-size: 0.95rem;
    }
    .auth-tabs {
      display: flex;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: var(--space-xl);
      background: var(--color-background);
    }
    .auth-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      font-weight: 600;
      color: var(--color-text-muted);
      transition: all 200ms;
      border: none;
      background: none;
      font-size: 1rem;
      font-family: var(--font-body);
    }
    .auth-tab.active {
      background: var(--color-primary);
      color: white;
      border-radius: 10px;
    }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .form-group {
      margin-bottom: var(--space-md);
    }
    .form-group label {
      display: block;
      font-weight: 500;
      margin-bottom: var(--space-xs);
      color: var(--color-text);
      font-size: 0.9rem;
    }
    .role-selector {
      display: flex;
      gap: var(--space-sm);
      margin-top: var(--space-xs);
    }
    .role-option {
      flex: 1;
      padding: 12px;
      border: 2px solid var(--color-border);
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: all 200ms;
      background: white;
    }
    .role-option:hover {
      border-color: var(--color-secondary);
    }
    .role-option.selected {
      border-color: var(--color-primary);
      background: var(--color-background);
    }
    .role-option input { display: none; }
    .role-icon { font-size: 1.5rem; display: block; margin-bottom: 4px; }
    .role-label { font-weight: 600; font-size: 0.9rem; color: var(--color-text); }
    .auth-error {
      background: #FEF2F2;
      color: #DC2626;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: var(--space-md);
      display: none;
    }
    .auth-error.show { display: block; }
    .auth-submit {
      width: 100%;
      padding: 14px;
      font-size: 1.05rem;
    }
    .auth-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .back-home {
      display: block;
      text-align: center;
      margin-top: var(--space-lg);
      color: var(--color-text-muted);
      font-size: 0.9rem;
    }
    .back-home:hover { color: var(--color-primary); }
    .loading-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <h1>SERENITY</h1>
        <p>示範包租代管服務平台</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login" id="tab-login">登入</button>
        <button class="auth-tab" data-tab="register" id="tab-register">註冊</button>
      </div>

      <!-- 錯誤訊息 -->
      <div class="auth-error" id="auth-error"></div>

      <!-- 登入表單 -->
      <form class="auth-form active" id="form-login">
        <div class="form-group">
          <label for="login-email">電子郵件</label>
          <input type="email" id="login-email" class="input" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="login-password">密碼</label>
          <input type="password" id="login-password" class="input" placeholder="請輸入密碼" required>
        </div>
        <button type="submit" class="btn btn-primary auth-submit" id="btn-login">登入</button>
      </form>

      <!-- 註冊表單 -->
      <form class="auth-form" id="form-register">
        <div class="form-group">
          <label for="reg-name">姓名</label>
          <input type="text" id="reg-name" class="input" placeholder="王小明" required>
        </div>
        <div class="form-group">
          <label for="reg-email">電子郵件</label>
          <input type="email" id="reg-email" class="input" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="reg-password">密碼</label>
          <input type="password" id="reg-password" class="input" placeholder="至少 6 個字元" required minlength="6">
        </div>
        <div class="form-group">
          <label>我的身分</label>
          <div class="role-selector">
            <label class="role-option selected" id="role-tenant">
              <input type="radio" name="role" value="tenant" checked>
              <span class="role-icon">🏠</span>
              <span class="role-label">我是租客</span>
            </label>
            <label class="role-option" id="role-landlord">
              <input type="radio" name="role" value="landlord">
              <span class="role-icon">🔑</span>
              <span class="role-label">我是房東</span>
            </label>
          </div>
        </div>
        <button type="submit" class="btn btn-primary auth-submit" id="btn-register">建立帳號</button>
      </form>

      <a href="/index.html" class="back-home">← 返回首頁</a>
    </div>
  </div>
  <script type="module" src="/src/js/login.js"></script>
</body>
</html>
