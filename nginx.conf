server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # === MPA 多頁面路由 ===
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # === Open Proxy 中轉（伺服器端注入 API Key，前端不可見）===
    location /api/open/ {
        proxy_pass https://ai-go.app/api/v1/open/;
        proxy_ssl_server_name on;
        proxy_set_header Host ai-go.app;
        proxy_set_header X-API-Key ${AIGO_API_KEY};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Content-Type $content_type;
    }

    # === Ext Proxy 中轉（透傳前端 Bearer Token）===
    location /api/ext/ {
        proxy_pass https://ai-go.app/api/v1/ext/;
        proxy_ssl_server_name on;
        proxy_set_header Host ai-go.app;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Content-Type $content_type;
    }

    # === Custom App Auth 中轉（公開端點，直接透傳）===
    location /api/custom-app-auth/ {
        proxy_pass https://ai-go.app/api/v1/custom-app-auth/;
        proxy_ssl_server_name on;
        proxy_set_header Host ai-go.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Content-Type $content_type;
    }

    # === 靜態資源長效快取 ===
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|eot|ttf)$ {
        expires max;
        access_log off;
    }

    error_page 404 /index.html;
}
