# ============================================================
# 部署到 Staging — Push 到 main 即自動部署
# https://rhs.staging.ai-go.app
# ============================================================

name: 部署到 Staging

on:
  workflow_dispatch:    # 允許在 GitHub Actions 頁面手動觸發
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - 'docs/**'

jobs:
  deploy:
    uses: AI-GO-APP/.github/.github/workflows/staging-deploy.yml@main
    with:
      project-name: rhs    # 子網域：rhs.staging.ai-go.app
    secrets: inherit
